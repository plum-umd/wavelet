name: Build Wavelet
on: [push]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: wavelet-core/lean
      - run: cargo build
      - run: cargo test
