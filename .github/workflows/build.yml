name: Build Wavelet
on: [push]
env:
  Z3_VERSION: 4.15.4
  CACHE_VERSION: v3
jobs:
  unit-tests:
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
          - runs-on: ubuntu-24.04-arm
          - runs-on: macos-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: wavelet-core/lean
          auto-config: false
      - uses: ./.github/actions/setup-z3
        with:
          version: ${{ env.Z3_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo fmt -- --check
      - run: cargo test --all
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - run: git submodule update --init --recursive integration-tests/circt
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: wavelet-core/lean
          auto-config: false
      - uses: ./.github/actions/setup-z3
        with:
          version: ${{ env.Z3_VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang lld git autoconf help2man perl flex bison libfl2 libfl-dev zlib1g zlib1g-dev
      - uses: ./.github/actions/setup-verilator
        with:
          version: v5.044
      # Build CIRCT/hlstool
      - id: circt-hash
        run: echo "sha=$(git rev-parse HEAD:integration-tests/circt)" >> $GITHUB_OUTPUT
      - uses: actions/cache/restore@v4
        id: circt-cache
        with:
          path: integration-tests/build/circt
          key: circt-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.circt-hash.outputs.sha }}
      - run: |
          if [ ! -f build/circt/bin/hlstool ]; then
            make build/circt/Makefile
            cmake --build build/circt --target hlstool --parallel $(nproc)
          fi
        working-directory: integration-tests
      - uses: actions/cache/save@v4
        if: steps.circt-cache.outputs.cache-hit != 'true'
        with:
          path: integration-tests/build/circt
          key: circt-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ runner.arch }}-${{ steps.circt-hash.outputs.sha }}
      - run: cargo build
      - run: make tests
        working-directory: integration-tests
  check-proofs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: wavelet-core/lean
          build-args: Thm
